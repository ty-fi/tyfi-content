name: Notify tyfi-portfolio of content changes

on:
  push:
    branches: [main]
    paths:
      - 'works/**'
      - 'press/**'
      - 'pdfs/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch content-updated to tyfi-portfolio
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PORTFOLIO_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/ty-fi/tyfi-portfolio/dispatches \
            -d '{"event_type": "content-updated"}'
